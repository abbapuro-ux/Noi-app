<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noi ❤️</title>

<style>
body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color:white;
  text-align:center;
}

.container{
  padding:30px;
  max-width:500px;
  margin:auto;
}

h1{
  font-size:34px;
  margin-bottom:10px;
}

.subtitle{
  opacity:0.7;
  font-size:14px;
  margin-bottom:25px;
}

.grid{
  display:grid;
  gap:15px;
}

.card{
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius:18px;
  padding:18px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.big{
  font-size:28px;
  font-weight:600;
  margin-top:5px;
}

.small{
  opacity:0.7;
  font-size:13px;
}

.heart{
  font-size:28px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">

<div class="heart">❤️</div>
<h1>Edoardo & Giada</h1>
<div class="subtitle">Un amore in tempo reale</div>

<div class="grid">

<div class="card">
<div class="small">Stiamo insieme da (2 marzo 2024)</div>
<div class="big" id="counter"></div>
</div>

<div class="card">
<div class="small">Ci frequentiamo dal (14 gennaio 2024)</div>
<div class="big">💞 Sempre più vicini</div>
</div>

<div class="card">
<div class="small">Messaggio per te</div>
<div class="big" id="msg"></div>
</div>

</div>
</div>

<script>

// DATA INIZIO RELAZIONE
const startDate = new Date("2024-03-02");

function updateCounter(){

  const now = new Date();
  const diff = now - startDate;

  const totalSeconds = Math.floor(diff / 1000);

  const days = Math.floor(totalSeconds / (3600 * 24));
  const hours = Math.floor((totalSeconds % (3600 * 24)) / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  document.getElementById("counter").innerText =
    `${days}g ${hours}h ${minutes}m ${seconds}s ❤️`;
}

updateCounter();
setInterval(updateCounter, 1000);

// frasi random
const frasi = [
"Sei la mia persona preferita ❤️",
"Con te tutto ha senso ❤️",
"Ogni secondo con te vale ❤️",
"Ti sceglierei sempre ❤️",
"Sei casa ❤️"
];

document.getElementById("msg").innerText =
frasi[Math.floor(Math.random()*frasi.length)];

</script>

</body>
</html>
