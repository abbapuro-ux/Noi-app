<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noi 💓</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background: radial-gradient(circle at top, #111827, #0b1220);
  color:white;
  text-align:center;
  overflow:hidden;
}

.container{
  max-width:520px;
  margin:auto;
  padding:25px;
}

.header{
  font-size:30px;
  font-weight:700;
  cursor:pointer;
  transition: transform 0.2s ease;
}

.header:active{
  transform: scale(0.98);
}

.sub{
  opacity:0.6;
  font-size:13px;
  margin-bottom:15px;
}

.page{display:none;}
.page.active{display:block;}

.grid{display:grid;gap:14px;}

/* ================= CARD IOS FEEL ================= */

.card{
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;
  padding:16px;
  backdrop-filter: blur(12px);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
  cursor:pointer;
}

.card:active{
  transform: scale(0.97) translateY(2px);
  filter: brightness(1.15);
  box-shadow:0 5px 18px rgba(0,0,0,0.6);
}

/* ================= BUTTON IOS FEEL ================= */

button{
  margin:5px;
  padding:10px 12px;
  border-radius:12px;
  border:none;
  background: rgba(255,255,255,0.12);
  color:white;
  transition: transform 0.12s ease, filter 0.12s ease;
  cursor:pointer;
}

button:active{
  transform: scale(0.95);
  filter: brightness(1.2);
}

/* bottom nav */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding:10px 0;
}

.nav button{
  background:none;
  font-size:14px;
}

/* cuori */
.heart-float{
  position:fixed;
  bottom:0;
  font-size:20px;
  animation:up 2s linear forwards;
}

@keyframes up{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-500px);opacity:0;}
}
</style>
</head>

<body>

<!-- HOME -->
<div class="page active" id="home">

<div class="container">

<div class="header" onclick="heartTap()">Edoardo 💓 Giada</div>
<div class="sub">noi due, sempre 💓</div>

<div class="grid">

<div class="card">
💞 Insieme dal 2 marzo 2024<br>
<div id="counter"></div>
</div>

<div class="card">
💭 Messaggio del giorno<br>
<div id="msg"></div>
</div>

<div class="card">
🎮 Interazioni<br>
<button onclick="love()">Ti amo ❤️</button>
<button onclick="music()">Musica 🎵</button>
</div>

</div>
</div>

</div>

<!-- SUSHI -->
<div class="page" id="sushi">
<div class="container">
<div class="header">🍣 Sushi Day</div>
<div id="sushiText"></div>
</div>
</div>

<!-- SECRET -->
<div class="page" id="secret">
<div class="container">
<div class="header">🔐 Segreto</div>

<input id="code" placeholder="inserisci codice" style="padding:10px;border-radius:10px;">
<br><br>
<button onclick="check()">Entra</button>

<div id="secretMsg"></div>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('sushi')">🍣</button>
<button onclick="show('secret')">🔐</button>
</div>

<script>

const start = new Date("2024-03-02");

const frasi = [
"Sei la mia casa ❤️",
"Ti amo ❤️",
"Sempre noi 💓",
"Sei tutto per me 💓",
"Con te è diverso ❤️"
];

let musicOn = false;
let heartCount = 0;

/* COUNTER */
function updateCounter(){
  const d = new Date() - start;
  const s = Math.floor(d/1000);
  const days = Math.floor(s/86400);
  const h = Math.floor((s%86400)/3600);
  const m = Math.floor((s%3600)/60);

  document.getElementById("counter").innerText =
  `${days}g ${h}h ${m}m`;
}

/* MSG */
function updateMsg(){
  document.getElementById("msg").innerText =
  frasi[Math.floor(Math.random()*frasi.length)];
}

/* PAGES */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* SUSHI */
function updateSushi(){
  const now = new Date();
  const day = now.getDate();

  if(day === 2){
    document.getElementById("sushiText").innerText = "OGGI SUSHI 🍣💓";
  } else {
    let next = new Date(now.getFullYear(), now.getMonth(), 2);
    if(day > 2) next = new Date(now.getFullYear(), now.getMonth()+1, 2);

    let diff = Math.ceil((next-now)/86400000);
    document.getElementById("sushiText") = "Mancano "+diff+" giorni 🍣";
  }
}

/* LOVE */
function love(){
  for(let i=0;i<6;i++){
    let h=document.createElement("div");
    h.className="heart-float";
    h.innerText="❤️";
    h.style.left=Math.random()*100+"%";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),2000);
  }
}

/* MUSIC */
function music(){
  musicOn=!musicOn;
  alert(musicOn?"Musica ON 🎵":"Musica OFF");
}

/* SECRET */
function check(){
  let val=document.getElementById("code").value;
  document.getElementById("secretMsg").innerText =
  (val==="02032024") ? "💓 corretto 💓" : "sbagliato";
}

/* HEART EASTER EGG */
function heartTap(){
  heartCount++;
  if(heartCount === 5){
    alert("💓 noi due");
    heartCount = 0;
  }
}

/* INIT */
updateCounter();
updateMsg();
updateSushi();

setInterval(updateCounter,1000);

</script>

</body>
</html>
