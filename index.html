<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noi ❤️</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background: radial-gradient(circle at top, #111827, #0b1220);
  color:white;
  text-align:center;
}

.container{
  max-width:520px;
  margin:auto;
  padding:25px;
}

.header{
  font-size:30px;
  font-weight:700;
  margin-top:10px;
}

.sub{
  opacity:0.6;
  font-size:13px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  gap:14px;
}

.card{
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;
  padding:16px;
  backdrop-filter: blur(12px);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.big{
  font-size:22px;
  font-weight:600;
  margin-top:6px;
}

.small{
  font-size:12px;
  opacity:0.6;
}

.heart{
  font-size:28px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

button{
  margin:5px;
  padding:10px 12px;
  border-radius:12px;
  border:none;
  background: rgba(255,255,255,0.12);
  color:white;
  font-weight:600;
}

button:active{
  transform:scale(0.97);
}

/* ================= MODAL APP STYLE ================= */

.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.0);
  backdrop-filter: blur(0px);
  align-items:center;
  justify-content:center;
  transition: all 0.25s ease;
}

.modal.show{
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.modal-box{
  background:rgba(20,20,30,0.95);
  padding:22px;
  border-radius:22px;
  width:80%;
  max-width:340px;
  text-align:center;
  color:white;

  transform: scale(0.7);
  opacity:0;
  transition: all 0.25s ease;
}

.modal-box.show{
  transform: scale(1);
  opacity:1;
}

.modal-text{
  font-size:18px;
  margin-bottom:15px;
}

.close-btn{
  background:rgba(255,255,255,0.1);
  border:none;
  padding:10px 14px;
  border-radius:12px;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="heart">❤️</div>
<div class="header">Edoardo & Giada</div>
<div class="sub">la nostra piccola app privata</div>

<div class="grid">

<div class="card">
<div class="small">💞 Insieme dal 2 marzo 2024</div>
<div class="big" id="counter"></div>
</div>

<div class="card">
<div class="small">💌 Ci frequentiamo dal 14 gennaio 2024</div>
<div class="big">Sempre più vicini ❤️</div>
</div>

<div class="card">
<div class="small">🍣 Sushi Day (ogni 2 del mese)</div>
<div class="big" id="sushi"></div>
</div>

<div class="card">
<div class="small">💭 Messaggio per te</div>
<div class="big" id="msg"></div>
</div>

<div class="card">
<div class="small">🎮 Interazioni</div>

<button onclick="loveClick()">Ti amo ❤️</button>
<button onclick="sushiClick()">Sushi 🍣</button>
<button onclick="gift()">Regalo 🎁</button>
<button onclick="secret()">Messaggio 💌</button>

<div class="small" id="loveCount"></div>
</div>

</div>
</div>

<!-- ================= MODAL ================= -->
<div id="modal" class="modal">
  <div id="modalBox" class="modal-box">
    <div id="modalText" class="modal-text"></div>
    <button onclick="closeModal()" class="close-btn">Chiudi</button>
  </div>
</div>

<script>

const startDate = new Date("2024-03-02");
let loveCounter = 0;

// ================= MODAL =================
function openModal(text){
  const modal = document.getElementById("modal");
  const box = document.getElementById("modalBox");

  document.getElementById("modalText").innerText = text;

  modal.style.display = "flex";

  setTimeout(()=>{
    modal.classList.add("show");
    box.classList.add("show");
  },10);
}

function closeModal(){
  const modal = document.getElementById("modal");
  const box = document.getElementById("modalBox");

  modal.classList.remove("show");
  box.classList.remove("show");

  setTimeout(()=>{
    modal.style.display = "none";
  },250);
}

// ================= CONTATORE =================
function updateCounter(){
  const now = new Date();
  const diff = now - startDate;

  const s = Math.floor(diff / 1000);
  const days = Math.floor(s / 86400);
  const hours = Math.floor((s % 86400) / 3600);
  const mins = Math.floor((s % 3600) / 60);
  const secs = s % 60;

  document.getElementById("counter").innerText =
    `${days}g ${hours}h ${mins}m ${secs}s ❤️`;
}

// ================= SUSHI =================
function updateSushi(){
  const now = new Date();
  const day = now.getDate();

  if(day === 2){
    document.getElementById("sushi").innerText = "OGGI SUSHI 🍣❤️";
  } else {
    let next = new Date(now.getFullYear(), now.getMonth(), 2);
    if(day > 2) next = new Date(now.getFullYear(), now.getMonth()+1, 2);

    const diff = Math.ceil((next-now)/(1000*60*60*24));
    document.getElementById("sushi").innerText = `Mancano ${diff} giorni 🍣`;
  }
}

// ================= MESSAGGI =================
const frasi = [
"Sei la mia casa ❤️",
"Ogni secondo con te vale ❤️",
"Ti sceglierei sempre ❤️",
"Non smetto mai di pensarti ❤️",
"Sei la cosa più bella ❤️"
];

function updateMsg(){
  document.getElementById("msg").innerText =
  frasi[Math.floor(Math.random()*frasi.length)];
}

// ================= BOTTONI =================
function loveClick(){
  loveCounter++;
  document.getElementById("loveCount").innerText =
  `Ti amo premuto ${loveCounter} volte ❤️`;

  openModal("Ti amo più di tutto ❤️");
}

function sushiClick(){
  const day = new Date().getDate();
  openModal(day===2 ? "OGGI SUSHI 🍣❤️" : "Non ancora sushi day 😋");
}

function gift(){
  const gifts = [
    "Ti amo più di ieri ❤️",
    "Sei il mio regalo ❤️",
    "Non cambierei noi ❤️",
    "Sei perfetta per me ❤️"
  ];
  openModal(gifts[Math.floor(Math.random()*gifts.length)]);
}

function secret(){
  const msgs = [
    "Sei tutto per me ❤️",
    "Non smetterò mai di sceglierti ❤️",
    "Con te è tutto più bello ❤️",
    "Ti amo davvero tanto ❤️"
  ];
  openModal(msgs[Math.floor(Math.random()*msgs.length)]);
}

// ================= INIT =================
updateCounter();
updateSushi();
updateMsg();

setInterval(updateCounter,1000);
setInterval(updateSushi,60000);

</script>

</body>
</html>
